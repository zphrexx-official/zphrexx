<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>@zphrexx.official</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background -->
    <div id="background"></div>

    <!-- Navigation -->
    <header>

        <div class="logo">
            @zphrexx.official
        </div>

    </header>

    <!-- Main -->
    <main>

        <img class="avatar" src="avatar.png" alt="Avatar">

        <section class="latest">

            <h1>Latest Short</h1>

            <div class="short-card">

                <img id="thumbnail"
                    src="https://placehold.co/1280x720/111111/39ff14?text=Latest+Short"
                    alt="Thumbnail">

                <h2 id="title">
                    Loading...
                </h2>

                <a id="watchButton" href="#" target="_blank">
                    Watch ▶
                </a>

            </div>

        </section>

        <section class="stats">

            <div class="stat">

                <span id="subs">...</span>

                <p>Subscribers</p>

            </div>

            <div class="stat">

                <span id="views">...</span>

                <p>Views</p>

            </div>

            <div class="stat">

                <span id="shorts">...</span>

                <p>Shorts</p>

            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
